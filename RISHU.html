<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RISHU BIND TOOL | Premium Account Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', monospace;
            background: #0a0a0a;
            color: #00ff00;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glow {
            text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00;
        }

        .glow-border {
            border: 1px solid #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .glow-button {
            transition: all 0.3s ease;
        }

        .glow-button:hover {
            box-shadow: 0 0 15px #00ff00;
            transform: translateY(-2px);
        }

        .auth-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .auth-box {
            background: #0f0f0f;
            border: 2px solid #00ff00;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #00ff00;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .auth-tab.active {
            background: #00ff00;
            color: #000;
            border-radius: 10px 10px 0 0;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: 'Orbitron', monospace;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            box-shadow: 0 0 15px #00ff00;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #00ff00;
            color: #000;
            border: none;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .auth-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #00ff00;
        }

        .dashboard {
            display: none;
            min-height: 100vh;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: #0a0a0a;
            border-right: 2px solid #00ff00;
            padding: 30px 20px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 100;
            overflow-y: auto;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid #00ff00;
        }

        .sidebar-header h2 {
            font-size: 20px;
            letter-spacing: 2px;
        }

        .sidebar-menu {
            list-style: none;
        }

        .sidebar-menu li {
            margin-bottom: 15px;
        }

        .sidebar-menu a {
            color: #00ff00;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 13px;
        }

        .sidebar-menu a i {
            margin-right: 12px;
            width: 20px;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: #00ff00;
            color: #000;
            box-shadow: 0 0 10px #00ff00;
        }

        .menu-toggle {
            position: fixed;
            left: 20px;
            top: 20px;
            z-index: 101;
            background: #00ff00;
            color: #000;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }

        .menu-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px #00ff00;
        }

        .main-content {
            margin-left: 0;
            padding: 80px 20px 20px 20px;
            transition: margin-left 0.3s;
        }

        .main-content.sidebar-open {
            margin-left: 280px;
        }

        @media (max-width: 768px) {
            .main-content.sidebar-open {
                margin-left: 0;
            }
        }

        .content-card {
            background: #0f0f0f;
            border: 1px solid #00ff00;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            animation: fadeIn 0.3s;
        }

        .content-card h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: 'Orbitron', monospace;
            border-radius: 8px;
        }

        .form-group input:focus {
            outline: none;
            box-shadow: 0 0 10px #00ff00;
        }

        .btn-submit {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .console-output {
            margin-top: 30px;
            background: #000;
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }

        .console-line {
            padding: 5px 0;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .console-success {
            color: #00ff00;
        }

        .console-error {
            color: #ff0000;
        }

        .console-info {
            color: #00ccff;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            display: none;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #00ff00;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0f0f0f;
            border: 1px solid #00ff00;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 2000;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .api-status {
            font-size: 10px;
            margin-top: 10px;
            color: #00ff00;
        }
        
        .method-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .method-btn {
            flex: 1;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #00ff00;
            color: #00ff00;
            cursor: pointer;
            border-radius: 8px;
            font-family: 'Orbitron', monospace;
            transition: all 0.3s;
        }
        
        .method-btn.active {
            background: #00ff00;
            color: #000;
        }
    </style>
</head>
<body>

<!-- Authentication Container -->
<div id="authContainer" class="auth-container">
    <div class="auth-box">
        <div class="auth-tabs">
            <div class="auth-tab active" data-tab="login">LOGIN</div>
            <div class="auth-tab" data-tab="register">REGISTER</div>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="auth-form active">
            <div class="input-group">
                <label><i class="fas fa-user"></i> USERNAME</label>
                <input type="text" id="loginUsername" placeholder="Enter username">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> PASSWORD</label>
                <input type="password" id="loginPassword" placeholder="Enter password">
            </div>
            <button class="auth-btn" onclick="handleLogin()">ACCESS SYSTEM</button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="auth-form">
            <div class="input-group">
                <label><i class="fas fa-user"></i> USERNAME</label>
                <input type="text" id="regUsername" placeholder="Choose username">
            </div>
            <div class="input-group">
                <label><i class="fas fa-envelope"></i> EMAIL</label>
                <input type="email" id="regEmail" placeholder="Enter email">
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> PASSWORD</label>
                <input type="password" id="regPassword" placeholder="Create password">
            </div>
            <div class="input-group">
                <label><i class="fas fa-check-circle"></i> CONFIRM PASSWORD</label>
                <input type="password" id="regConfirm" placeholder="Confirm password">
            </div>
            <button class="auth-btn" onclick="handleRegister()">CREATE ACCOUNT</button>
        </div>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard">
    <button class="menu-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 class="glow">RISHU BIND</h2>
            <p style="font-size: 10px;">PREMIUM TOOL</p>
        </div>
        <ul class="sidebar-menu">
            <li><a href="#" onclick="loadContent('home')" data-page="home"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="#" onclick="loadContent('bind')" data-page="bind"><i class="fas fa-link"></i> Bind New Email</a></li>
            <li><a href="#" onclick="loadContent('check')" data-page="check"><i class="fas fa-search"></i> Check Bind Info</a></li>
            <li><a href="#" onclick="loadContent('cancel')" data-page="cancel"><i class="fas fa-times-circle"></i> Cancel Request</a></li>
            <li><a href="#" onclick="loadContent('unbind')" data-page="unbind"><i class="fas fa-unlock-alt"></i> Unbind Email</a></li>
            <li><a href="#" onclick="loadContent('change')" data-page="change"><i class="fas fa-exchange-alt"></i> Change Email</a></li>
            <li><a href="#" onclick="loadContent('eat')" data-page="eat"><i class="fas fa-exchange-alt"></i> EAT to Token</a></li>
            <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </div>

    <div class="main-content" id="mainContent">
        <!-- Dynamic content will be loaded here -->
    </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const API_BASE_URL = "https://rishu-official-bind.vercel.app/api";
    
    // ==================== USER DATA STORAGE ====================
    let currentUser = null;
    
    // ==================== API CALL FUNCTIONS ====================
    async function callApi(endpoint, params = {}) {
        const url = `${API_BASE_URL}/${endpoint}`;
        const queryString = new URLSearchParams(params).toString();
        const fullUrl = queryString ? `${url}?${queryString}` : url;
        
        try {
            const response = await fetch(fullUrl, {
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            });
            const data = await response.json();
            return data;
        } catch (error) {
            console.error('API Error:', error);
            return { success: false, error: error.message };
        }
    }
    
    // API Functions
    async function sendOtp(token, email) {
        return await callApi("send-otp", { access_token: token, email, app_id: "100067" });
    }
    
    async function bindEmail(token, email, otp, secCode) {
        return await callApi("bind", { access_token: token, email, otp, secondary_password: secCode, app_id: "100067" });
    }
    
    async function getBindInfo(token) {
        return await callApi("get-bind-info", { access_token: token, app_id: "100067" });
    }
    
    async function cancelRequest(token) {
        return await callApi("cancel", { access_token: token, app_id: "100067" });
    }
    
    async function unbindWithSec(token, secCode) {
        return await callApi("unbind-with-sec", { access_token: token, secondary_password: secCode, app_id: "100067" });
    }
    
    async function unbindWithOtp(token, email, otp) {
        return await callApi("unbind-with-otp", { access_token: token, email, otp, app_id: "100067" });
    }
    
    async function changeEmailOtp(token, oldEmail, newEmail, oldOtp, newOtp) {
        return await callApi("change-email-otp", { access_token: token, old_email: oldEmail, new_email: newEmail, old_otp: oldOtp, new_otp: newOtp, app_id: "100067" });
    }
    
    async function changeEmailSec(token, oldEmail, newEmail, secCode, newOtp) {
        return await callApi("change-email-sec", { access_token: token, old_email: oldEmail, new_email: newEmail, secondary_password: secCode, new_otp: newOtp, app_id: "100067" });
    }
    
    async function eatToAccessToken(eatToken) {
        return await callApi("eat-token-access-token", { eat_token: eatToken });
    }
    
    // ==================== AUTHENTICATION ====================
    function init() {
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadContent('home');
        }
    }
    
    function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        
        if (!username || !password) {
            showToast('Please enter username and password', 'error');
            return;
        }
        
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        const user = users.find(u => u.username === username && u.password === password);
        
        if (user) {
            currentUser = user;
            localStorage.setItem('currentUser', JSON.stringify(user));
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadContent('home');
            showToast('Login successful!', 'success');
        } else {
            showToast('Invalid credentials!', 'error');
        }
    }
    
    function handleRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const confirm = document.getElementById('regConfirm').value.trim();
        
        if (!username || !email || !password || !confirm) {
            showToast('Please fill all fields', 'error');
            return;
        }
        
        if (password !== confirm) {
            showToast('Passwords do not match', 'error');
            return;
        }
        
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        if (users.find(u => u.username === username)) {
            showToast('Username already exists', 'error');
            return;
        }
        
        const newUser = { username, email, password };
        users.push(newUser);
        localStorage.setItem('users', JSON.stringify(users));
        showToast('Registration successful! Please login.', 'success');
        
        document.querySelector('[data-tab="login"]').click();
        document.getElementById('loginUsername').value = username;
    }
    
    function logout() {
        localStorage.removeItem('currentUser');
        currentUser = null;
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('authContainer').style.display = 'flex';
        showToast('Logged out successfully', 'success');
    }
    
    // ==================== UI FUNCTIONS ====================
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        sidebar.classList.toggle('open');
        mainContent.classList.toggle('sidebar-open');
    }
    
    let currentUnbindMethod = 'sec';
    let currentChangeMethod = 'otp';
    
    function loadContent(page) {
        const contentDiv = document.getElementById('mainContent');
        let html = '';
        
        switch(page) {
            case 'home':
                html = `
                    <div class="content-card">
                        <h2 class="glow"><i class="fas fa-terminal"></i> WELCOME, ${currentUser.username.toUpperCase()}</h2>
                        <p>RISHU BIND MANAGER - Premium Account Management System</p>
                        <br>
                        <p>API Status: <span style="color: #00ff00;">● ONLINE</span></p>
                        <p>Endpoint: <span style="font-size: 10px;">${API_BASE_URL}</span></p>
                        <br>
                        <p>Available Tools:</p>
                        <ul style="margin-left: 20px; margin-top: 10px;">
                            <li>✓ Bind New Email</li>
                            <li>✓ Check Bind Information</li>
                            <li>✓ Cancel Pending Request</li>
                            <li>✓ Unbind (OTP / Security Code)</li>
                            <li>✓ Change Email (OTP / Security Code)</li>
                            <li>✓ EAT to Access Token Converter</li>
                        </ul>
                    </div>
                `;
                break;
                
            case 'bind':
                html = `
                    <div class="content-card">
                        <h2><i class="fas fa-link"></i> BIND NEW EMAIL</h2>
                        <div class="form-group">
                            <label>ACCESS TOKEN</label>
                            <input type="password" id="bindToken" placeholder="Enter access token">
                        </div>
                        <div class="form-group">
                            <label>NEW EMAIL</label>
                            <input type="email" id="bindEmail" placeholder="Enter email address">
                        </div>
                        <div class="form-group">
                            <label>OTP CODE</label>
                            <input type="password" id="bindOtp" placeholder="Enter OTP from email">
                        </div>
                        <div class="form-group">
                            <label>SECURITY CODE</label>
                            <input type="password" id="bindSecCode" placeholder="Set security code">
                        </div>
                        <button class="btn-submit glow-button" onclick="executeOperation('bind')">BIND EMAIL</button>
                        <div class="console-output" id="consoleBind"></div>
                    </div>
                `;
                break;
                
            case 'check':
                html = `
                    <div class="content-card">
                        <h2><i class="fas fa-search"></i> CHECK BIND INFO</h2>
                        <div class="form-group">
                            <label>ACCESS TOKEN</label>
                            <input type="password" id="checkToken" placeholder="Enter access token">
                        </div>
                        <button class="btn-submit glow-button" onclick="executeOperation('check')">CHECK INFO</button>
                        <div class="console-output" id="consoleCheck"></div>
                    </div>
                `;
                break;
                
            case 'cancel':
                html = `
                    <div class="content-card">
                        <h2><i class="fas fa-times-circle"></i> CANCEL REQUEST</h2>
                        <div class="form-group">
                            <label>ACCESS TOKEN</label>
                            <input type="password" id="cancelToken" placeholder="Enter access token">
                        </div>
                        <button class="btn-submit glow-button" onclick="executeOperation('cancel')">CANCEL REQUEST</button>
                        <div class="console-output" id="consoleCancel"></div>
                    </div>
                `;
                break;
                
            case 'unbind':
                html = `
                    <div class="content-card">
                        <h2><i class="fas fa-unlock-alt"></i> UNBIND EMAIL</h2>
                        <div class="method-selector">
                            <button class="method-btn ${currentUnbindMethod === 'sec' ? 'active' : ''}" onclick="setUnbindMethod('sec')">Security Code</button>
                            <button class="method-btn ${currentUnbindMethod === 'otp' ? 'active' : ''}" onclick="setUnbindMethod('otp')">OTP</button>
                        </div>
                        <div class="form-group">
                            <label>ACCESS TOKEN</label>
                            <input type="password" id="unbindToken" placeholder="Enter access token">
                        </div>
                        <div id="unbindSecFields" style="${currentUnbindMethod === 'sec' ? 'display:block' : 'display:none'}">
                            <div class="form-group">
                                <label>SECURITY CODE</label>
                                <input type="password" id="unbindSecCode" placeholder="Enter security code">
                            </div>
                        </div>
                        <div id="unbindOtpFields" style="${currentUnbindMethod === 'otp' ? 'display:block' : 'display:none'}">
                            <div class="form-group">
                                <label>EMAIL</label>
                                <input type="email" id="unbindOtpEmail" placeholder="Enter email">
                            </div>
                            <div class="form-group">
                                <label>OTP CODE</label>
                                <input type="password" id="unbindOtpCode" placeholder="Enter OTP">
                            </div>
                        </div>
                        <button class="btn-submit glow-button" onclick="executeOperation('unbind')">UNBIND</button>
                        <div class="console-output" id="consoleUnbind"></div>
                    </div>
                `;
                break;
                
            case 'change':
                html = `
                    <div class="content-card">
                        <h2><i class="fas fa-exchange-alt"></i> CHANGE EMAIL</h2>
                        <div class="method-selector">
                            <button class="method-btn ${currentChangeMethod === 'otp' ? 'active' : ''}" onclick="setChangeMethod('otp')">OTP on both</button>
                            <button class="method-btn ${currentChangeMethod === 'sec' ? 'active' : ''}" onclick="setChangeMethod('sec')">Security Code + OTP</button>
                        </div>
                        <div class="form-group">
                            <label>ACCESS TOKEN</label>
                            <input type="password" id="changeToken" placeholder="Enter access token">
                        </div>
                        <div class="form-group">
                            <label>OLD EMAIL</label>
                            <input type="email" id="changeOldEmail" placeholder="Current email">
                        </div>
                        <div class="form-group">
                            <label>NEW EMAIL</label>
                            <input type="email" id="changeNewEmail" placeholder="New email">
                        </div>
                        <div id="changeOtpFields" style="${currentChangeMethod === 'otp' ? 'display:block' : 'display:none'}">
                            <div class="form-group">
                                <label>OTP CODE (from old email)</label>
